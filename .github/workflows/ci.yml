name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run backend tests with Pydantic warnings as errors
        run: |
          python - <<'PY'
          import warnings
          from pydantic.warnings import PydanticDeprecatedSince20
          import pytest
          warnings.simplefilter("error", PydanticDeprecatedSince20)
          raise SystemExit(pytest.main(["-q"]))
          PY

      - name: Compile backend
        run: python -m compileall backend/app

      - name: Release candidate checks
        run: python scripts/rc_checks.py

      - name: Validate Docker Compose config
        env:
          POSTGRES_PASSWORD: ci_dummy_password
        run: docker compose -f docker-compose.staging.yml config --quiet

      - name: Build backend Docker image
        run: docker build -t luma-backend-ci ./backend

  ios:
    name: iOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Pick available iPhone simulator
        id: simulator
        shell: bash
        run: |
          xcrun simctl list devices available
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import subprocess

          payload = subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "--json"], text=True)
          devices = json.loads(payload)["devices"]
          preferred = ["iPhone 16", "iPhone 15", "iPhone 14", "iPhone 13"]
          all_iphones = [
              device["name"]
              for runtime_devices in devices.values()
              for device in runtime_devices
              if device.get("isAvailable") and device.get("name", "").startswith("iPhone")
          ]
          for name in preferred:
              if name in all_iphones:
                  print(f"name={name}")
                  break
          else:
              if not all_iphones:
                  raise SystemExit("No available iPhone simulator found")
              print(f"name={all_iphones[-1]}")
          PY

      - name: Run iOS tests
        run: |
          xcodebuild test \
            -project ios/BeautyConcierge.xcodeproj \
            -scheme BeautyConcierge \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}"

      - name: Build iOS release without signing
        run: |
          xcodebuild \
            -project ios/BeautyConcierge.xcodeproj \
            -scheme BeautyConcierge \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO build
